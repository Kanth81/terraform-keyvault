trigger:
  branches:
    include:
      - master
      - feature/*
      - bugfix/*

pr:
  branches:
    include:
      - master

variables:
  terraformVersion: '1.11.3'
  workingDirectory: '$(System.DefaultWorkingDirectory)'
  tfPlanFile: 'tfplan'
  devTfvarsFile: 'env/dev.tfvars'
  prodTfvarsFile: 'env/prod.tfvars'

  # Azure DevOps service connections
  devServiceConnection: 'sc-azure-dev-oidc'
  prodServiceConnection: 'sc-azure-prod-oidc'

  # Remote state backend values
  backendResourceGroup: 'rg-terraform-state'
  backendStorageAccount: 'tfstatekeyvaultdemo'
  backendContainer: 'tfstate'
  backendKeyDev: 'keyvault/dev/terraform.tfstate'
  backendKeyProd: 'keyvault/prod/terraform.tfstate'

stages:
  - stage: Validate
    displayName: 'Validate Terraform'
    jobs:
      - job: Validate
        displayName: 'Terraform fmt, init, validate'
        pool:
          name: Default
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: '$(terraformVersion)'

          - task: AzureCLI@2
            displayName: 'Terraform init and validate'
            inputs:
              azureSubscription: '$(devServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: '$(workingDirectory)'
              inlineScript: |
                set -e

                terraform fmt -check -recursive

                terraform init \
                  -backend-config="resource_group_name=$(backendResourceGroup)" \
                  -backend-config="storage_account_name=$(backendStorageAccount)" \
                  -backend-config="container_name=$(backendContainer)" \
                  -backend-config="key=$(backendKeyDev)"

                terraform validate

  - stage: Plan_Dev
    displayName: 'Plan Dev'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: PlanDev
        displayName: 'Terraform plan for Dev'
        pool:
          name: Default
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: '$(terraformVersion)'

          - task: AzureCLI@2
            displayName: 'Terraform plan (Dev)'
            inputs:
              azureSubscription: '$(devServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: '$(workingDirectory)'
              inlineScript: |
                set -e

                terraform init \
                  -backend-config="resource_group_name=$(backendResourceGroup)" \
                  -backend-config="storage_account_name=$(backendStorageAccount)" \
                  -backend-config="container_name=$(backendContainer)" \
                  -backend-config="key=$(backendKeyDev)"

                terraform plan \
                  -out=$(tfPlanFile) \
                  -input=false \
                  -var-file=$(devTfvarsFile)

                terraform show -no-color $(tfPlanFile) > dev-plan.txt

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Dev plan artifact'
            inputs:
              targetPath: '$(workingDirectory)'
              artifact: 'terraform-dev-plan'

  - stage: Apply_Dev
    displayName: 'Apply Dev'
    dependsOn: Plan_Dev
    condition: succeeded()
    jobs:
      - deployment: ApplyDev
        displayName: 'Apply Terraform to Dev'
        environment: 'tf-dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Dev plan artifact'
                  inputs:
                    artifact: 'terraform-dev-plan'
                    path: '$(Pipeline.Workspace)/terraform-dev-plan'

                - task: TerraformInstaller@1
                  displayName: 'Install Terraform'
                  inputs:
                    terraformVersion: '$(terraformVersion)'

                - task: AzureCLI@2
                  displayName: 'Terraform apply (Dev)'
                  inputs:
                    azureSubscription: '$(devServiceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: '$(Pipeline.Workspace)/terraform-dev-plan'
                    inlineScript: |
                      set -e

                      terraform init \
                        -backend-config="resource_group_name=$(backendResourceGroup)" \
                        -backend-config="storage_account_name=$(backendStorageAccount)" \
                        -backend-config="container_name=$(backendContainer)" \
                        -backend-config="key=$(backendKeyDev)"

                      terraform apply -input=false -auto-approve $(tfPlanFile)

